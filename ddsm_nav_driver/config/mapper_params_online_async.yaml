slam_toolbox:
  ros__parameters:
    # ROS 2 Frame & Topic bindings
    odom_frame: odom           # Keep this as "odom" (frame name)
    base_frame: base_link
    scan_topic: /scan     # Set this to your custom topic
    mode: mapping

    # Core SLAM Hyperparameters
    map_update_interval: 1.0
    max_laser_range: 12.0
    minimum_time_interval: 0.1
    transform_timeout: 0.2
    tf_buffer_duration: 10.0

    # Correlation Matcher Parameters
    loop_search_maximum_distance: 4.0
    resolution: 0.05
